version: '3.8'

services:
  multi-honeypot:
    build: .
    container_name: hades-multi-honeypot
    ports:
      - "2222:2222" # SSH Honeypot
      - "2121:2121" # FTP Honeypot
      - "5000:5000" # API Server
      - "5354:5354/udp" # DNS Honeypot
      - "8081:8081"   # HTTP Honeypot 
      - "2525:2525"   # SMTP Honeypot
    volumes:
      - ./data:/app/data
      - ./honeypot.db:/app/honeypot.db
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - honeypot-network

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: hades-dashboard
    ports:
      - "3000:3000"
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    depends_on:
      - multi-honeypot
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    restart: unless-stopped
    networks:
      - honeypot-network

networks:
  honeypot-network:
    driver: bridge

volumes:
  honeypot-data:
    driver: local
