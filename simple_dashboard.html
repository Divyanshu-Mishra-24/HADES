<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HADES SSH Honeypot Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-number { font-size: 2em; font-weight: bold; color: #1890ff; }
        .logs { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .log-entry { border-bottom: 1px solid #eee; padding: 10px 0; }
        .success { color: green; }
        .failed { color: red; }
        .refresh-btn { background: #1890ff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔒 HADES SSH Honeypot Dashboard</h1>
            <p>Real-time monitoring of SSH attack activity</p>
            <button class="refresh-btn" onclick="loadData()">🔄 Refresh Data</button>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalAttempts">0</div>
                <div>Total Attempts</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="successfulLogins">0</div>
                <div>Successful Logins</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="failedLogins">0</div>
                <div>Failed Logins</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalSessions">0</div>
                <div>Total Sessions</div>
            </div>
        </div>

        <div class="logs">
            <h2>📝 Recent Authentication Attempts</h2>
            <div id="authLogs"></div>
        </div>

        <div class="logs" style="margin-top: 20px;">
            <h2>💻 Recent Commands</h2>
            <div id="commandLogs"></div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('/api/dashboard');
                const data = await response.json();
                
                // Update stats
                document.getElementById('totalAttempts').textContent = data.summary.total_auth_attempts;
                document.getElementById('successfulLogins').textContent = data.summary.successful_logins;
                document.getElementById('failedLogins').textContent = data.summary.failed_logins;
                document.getElementById('totalSessions').textContent = data.summary.total_sessions;
                
                // Update auth logs
                const authLogsHtml = data.recent_auth.map(log => `
                    <div class="log-entry">
                        <strong>${new Date(log.timestamp).toLocaleString()}</strong> - 
                        ${log.src_ip}:${log.src_port} - 
                        <strong>${log.username}</strong>@<code>${log.password.substring(0, 20)}...</code> - 
                        <span class="${log.success ? 'success' : 'failed'}">${log.success ? 'SUCCESS' : 'FAILED'}</span>
                    </div>
                `).join('');
                document.getElementById('authLogs').innerHTML = authLogsHtml || '<p>No authentication attempts yet</p>';
                
                // Update command logs
                const commandLogsHtml = data.recent_commands.map(log => `
                    <div class="log-entry">
                        <strong>${new Date(log.timestamp).toLocaleString()}</strong> - 
                        Session: <code>${log.session_id.substring(0, 8)}...</code> - 
                        <code>${log.command}</code> ${log.args || ''}
                    </div>
                `).join('');
                document.getElementById('commandLogs').innerHTML = commandLogsHtml || '<p>No commands executed yet</p>';
                
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }
        
        // Auto-refresh every 5 seconds
        loadData();
        setInterval(loadData, 5000);
    </script>
</body>
</html>
